<!DOCTYPE html>
<html>
<head>
    <title>Machine Gap - Test Page</title>
    <style>
        body { font-family: monospace; margin: 40px; }
        .status { border: 1px solid #000; padding: 20px; margin: 20px 0; }
        .ok { color: green; }
        .error { color: red; }
        button { padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Machine Gap Connection Test</h1>
    
    <div class="status">
        <h2>Server Check</h2>
        <div id="server-status">Testing...</div>
    </div>
    
    <div class="status">
        <h2>Endpoint Check</h2>
        <div id="endpoint-status">Testing...</div>
    </div>
    
    <div class="status">
        <h2>Direct Link Test</h2>
        <button onclick="testMainPage()">Open Main Page</button>
        <div id="link-status"></div>
    </div>

    <script>
        // Test 1: Check if server responds
        fetch('http://localhost:8000/')
            .then(r => {
                document.getElementById('server-status').innerHTML = 
                    '<span class="ok">✅ Server is running at localhost:8000</span>';
                return r.text();
            })
            .then(html => {
                if (html.includes('Machine Gap')) {
                    document.getElementById('endpoint-status').innerHTML = 
                        '<span class="ok">✅ Main page HTML is loading correctly</span>';
                } else {
                    document.getElementById('endpoint-status').innerHTML = 
                        '<span class="error">❌ Page loaded but Machine Gap content not found</span>';
                }
            })
            .catch(e => {
                document.getElementById('server-status').innerHTML = 
                    '<span class="error">❌ Cannot reach server: ' + e.message + '</span>';
                document.getElementById('endpoint-status').innerHTML = 
                    '<span class="error">❌ Could not load page</span>';
            });

        function testMainPage() {
            window.open('http://localhost:8000/', '_blank');
            document.getElementById('link-status').innerHTML = 
                'Page should open in new tab. If it doesn\'t:<br>' +
                '1. Make sure http://localhost:8000 is correct<br>' +
                '2. Check if server is running<br>' +
                '3. If you\'re on a different machine, use the server\'s IP address instead';
        }
    </script>
</body>
</html>
