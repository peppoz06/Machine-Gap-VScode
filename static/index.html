<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machine Gap</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Stage 1: Invitation & Input -->
  <div id="stage-input">
    <h1>Machine Gap</h1>
    <p>Martina and Giuseppe are two AI mentors with different perspectives who reflect on your input and explore the future beyond hype.
Enter a topic or concern, and watch them respond and discuss about it.</p>
    <form id="form">
      <input id="input" type="text" placeholder="Enter your prompt..." autocomplete="off">
      <button type="submit">Submit</button>
    </form>
    <!-- Status/logging area -->
    <div id="status" style="margin-top:1rem; font-size:0.85rem; color:#666; border:1px solid #ccc; padding:8px; min-height:2rem; font-family:monospace; white-space:pre-wrap; word-break:break-word;"></div>
  </div>

  <!-- Stage 2: Dialogue & Metrics (hidden until submitted) -->
  <div id="stage-output" style="display:none;">
    <h1>Machine Gap</h1>
    <!-- Voice control button -->
    <div style="margin-bottom:1rem;">
      <button id="voice-toggle" style="padding:8px 16px; border:1px solid #000; background:#fff; font-family:monospace; cursor:pointer;">🔊 Enable Voice</button>
    </div>
    <!-- Status/logging area -->
    <div id="status-output" style="margin-bottom:1rem; font-size:0.85rem; color:#666; border:1px solid #ccc; padding:8px; min-height:1rem; font-family:monospace; white-space:pre-wrap; word-break:break-word;"></div>
    <!-- This is where the dialogue appears -->
    <div id="dialogue"></div>
    <!-- Metrics displayed at the end -->
    <div id="metrics"></div>
  </div>

  <!-- Scripts are split into small files for readability -->
  <script src="/static/scripts/logging.js?v=1"></script>
  <script src="/static/scripts/tts.js?v=3"></script>
  <script src="/static/scripts/chat.js?v=5"></script>
  <script src="/static/scripts/api.js?v=2"></script>
  <script src="/static/scripts/main.js?v=3"></script>
</body>
</html>
